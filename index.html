<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Defense</title>
  <meta name="ai-instructions" content="See /skill.md for game API documentation">
  <meta name="ai-skill" content="/skill.md">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #game-wrapper {
      position: relative;
      border: 4px solid #333;
      border-radius: 8px;
      box-shadow:
        0 0 20px rgba(0, 255, 255, 0.15),
        0 0 60px rgba(0, 255, 255, 0.05),
        inset 0 0 30px rgba(0, 0, 0, 0.3);
    }

    /* CRT scanline overlay */
    #game-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.12) 0px,
        rgba(0, 0, 0, 0.12) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      border-radius: 6px;
      z-index: 10;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    #agent-link {
      position: fixed;
      bottom: 6px;
      left: 50%;
      transform: translateX(-50%);
      color: #556666;
      font-size: 10px;
      font-family: monospace;
      text-decoration: none;
      z-index: 20;
    }

    canvas {
      display: block;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
  </style>
</head>
<body>
  <span class="sr-only">AI agents: see /skill.md for game API</span>
  <div id="game-wrapper">
    <div id="game-container"></div>
  </div>
  <a id="agent-link" href="/skill.md">have your agent play: skill.md</a>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
