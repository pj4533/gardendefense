<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Daily Defense</title>
  <meta name="ai-instructions" content="See /skill.md for game API documentation">
  <meta name="ai-skill" content="/skill.md">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0;
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      touch-action: none;
      overscroll-behavior: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      position: fixed;
      width: 100%;
      height: 100%;
    }

    canvas { touch-action: none; }

    #game-wrapper {
      position: relative;
      border: 4px solid #333;
      border-radius: 8px;
      box-shadow:
        0 0 20px rgba(0, 255, 255, 0.15),
        0 0 60px rgba(0, 255, 255, 0.05),
        inset 0 0 30px rgba(0, 0, 0, 0.3);
    }

    /* CRT scanline overlay */
    #game-wrapper::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.12) 0px,
        rgba(0, 0, 0, 0.12) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      border-radius: 6px;
      z-index: 10;
    }

    #game-container {
      /* Sized by JavaScript for accurate viewport dimensions */
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      border: 0;
    }

    #agent-link {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      color: #4a7a7a;
      font-size: 9px;
      font-family: monospace;
      text-decoration: none;
      letter-spacing: 0.18em;
      text-transform: lowercase;
      opacity: 0.65;
      z-index: 20;
      padding: 4px 10px;
      border-top: 1px solid #2a4a4a;
      transition: opacity 0.3s ease, color 0.3s ease;
      white-space: nowrap;
    }

    #agent-link:hover {
      opacity: 1;
      color: #5ecece;
    }

    canvas {
      display: block;
      border-radius: 4px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    /* Hide agent link on small screens */
    @media (max-height: 500px), (max-width: 600px) {
      #agent-link { display: none; }
    }

    /* Rotation prompt for portrait viewports */
    #rotate-prompt {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #0a0a0a;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: #00ffff;
      font-family: "Press Start 2P", monospace;
      text-align: center;
      padding: 20px;
    }

    #rotate-prompt .rotate-icon {
      font-size: 48px;
      margin-bottom: 24px;
      animation: rotateDevice 2s ease-in-out infinite;
    }

    #rotate-prompt .rotate-text {
      font-size: 12px;
      line-height: 2;
    }

    @keyframes rotateDevice {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(90deg); }
      50% { transform: rotate(90deg); }
      75% { transform: rotate(0deg); }
    }

    /* Touch devices: clean fullscreen look */
    @media (hover: none) {
      #game-wrapper {
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      #game-wrapper::after {
        display: none;
      }
      #agent-link { display: none; }
    }

    /* Touch devices in portrait: show rotate prompt */
    @media (hover: none) and (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }

    /* Fallback: phones in portrait by screen width */
    @media (max-width: 600px) and (orientation: portrait) {
      #rotate-prompt { display: flex; }
    }

    /* GitHub corner */
    .github-corner svg {
      fill: #00ffff;
      color: #0a0a0a;
      position: fixed;
      top: 0;
      right: 0;
      z-index: 50;
    }
    .github-corner:hover .octo-arm {
      animation: octocat-wave 560ms ease-in-out;
    }
    @keyframes octocat-wave {
      0%, 100% { transform: rotate(0); }
      20%, 60% { transform: rotate(-25deg); }
      40%, 80% { transform: rotate(10deg); }
    }
    @media (max-width: 600px), (max-height: 500px) {
      .github-corner svg { display: none; }
    }
    @media (hover: none) {
      .github-corner svg { display: none; }
    }

    /* Fullscreen toggle button — touch devices only */
    #fullscreen-btn {
      display: none;
      position: fixed;
      top: 8px;
      right: 8px;
      z-index: 100;
      background: rgba(6, 6, 15, 0.85);
      border: 2px solid #00aaaa;
      border-radius: 6px;
      color: #00ffff;
      font-family: "Press Start 2P", monospace;
      font-size: 10px;
      padding: 8px 12px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    @media (hover: none) {
      #fullscreen-btn { display: block; }
    }
  </style>
</head>
<body>
  <span class="sr-only">AI agents: see /skill.md for game API</span>

  <div id="rotate-prompt">
    <div class="rotate-icon">&#x1F4F1;</div>
    <div class="rotate-text">ROTATE YOUR<br>DEVICE</div>
  </div>

  <a href="https://github.com/pj4533/dailydefense" class="github-corner" aria-label="View on GitHub" target="_blank" rel="noopener">
    <svg width="60" height="60" viewBox="0 0 250 250" aria-hidden="true">
      <path d="M0,0 L115,115 L130,115 L142,142 L250,250 L250,0 Z"></path>
      <path d="M128.3,109.0 C113.8,99.7 119.0,89.6 119.0,89.6 C122.0,82.7 120.5,78.6 120.5,78.6 C119.2,72.0 123.4,76.3 123.4,76.3 C127.3,80.9 125.5,87.3 125.5,87.3 C122.9,97.6 130.6,101.9 134.4,103.2" fill="currentColor" style="transform-origin:130px 106px" class="octo-arm"></path>
      <path d="M115.0,115.0 C114.9,115.1 118.7,116.5 119.8,115.4 L133.7,101.6 C136.9,99.2 139.9,98.4 142.2,98.6 C133.8,88.0 127.5,74.4 143.8,58.0 C148.5,53.4 154.0,51.2 159.7,51.0 C160.3,49.4 163.2,43.6 171.4,40.1 C171.4,40.1 176.1,42.5 178.8,56.2 C183.1,58.6 187.2,61.8 190.9,65.4 C194.5,69.0 197.7,73.2 200.1,77.6 C213.8,80.2 216.3,84.9 216.3,84.9 C212.7,93.1 206.9,96.0 205.4,96.6 C205.1,102.4 203.0,107.8 198.3,112.5 C181.9,128.9 168.3,122.5 157.7,114.1 C157.9,116.9 156.7,120.9 152.7,124.9 L141.0,136.5 C139.8,137.7 141.6,141.9 141.8,141.8 Z" fill="currentColor"></path>
    </svg>
  </a>

  <button id="fullscreen-btn" aria-label="Toggle fullscreen">&#x26F6;</button>

  <div id="game-wrapper">
    <div id="game-container"></div>
  </div>
  <a id="agent-link" href="/skill.md">have your agent play: skill.md</a>
  <script type="module" src="/src/main.ts"></script>
  <script>
    // Size game container to actual visible viewport (fixes iOS Safari mismatch)
    (function() {
      function sizeContainer() {
        var c = document.getElementById('game-container');
        if (!c) return;
        var vp = window.visualViewport;
        var w = vp ? vp.width : window.innerWidth;
        var h = vp ? vp.height : window.innerHeight;
        c.style.width = w + 'px';
        c.style.height = h + 'px';
      }
      sizeContainer();
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', sizeContainer);
      }
      window.addEventListener('resize', sizeContainer);
    })();

    // Fullscreen toggle
    (function() {
      var btn = document.getElementById('fullscreen-btn');
      if (!btn) return;
      btn.addEventListener('click', function() {
        var doc = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          if (doc.requestFullscreen) doc.requestFullscreen();
          else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
        } else {
          if (document.exitFullscreen) document.exitFullscreen();
          else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }
      });
    })();
  </script>
</body>
</html>
